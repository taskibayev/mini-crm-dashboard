<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    margin: 0;
    padding: 16px;
    color: #1f2937;
    background: #fff;
  }

  h2 {
    margin: 0 0 16px;
    font-size: 18px;
    font-weight: 600;
  }

  h3 {
    margin: 0 0 12px;
    font-size: 15px;
    font-weight: 600;
  }

  #add-client-form {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid #e5e7eb;
  }

  #add-client-form label {
    font-size: 13px;
    font-weight: 500;
    color: #374151;
  }

  #add-client-form input,
  #add-client-form textarea {
    width: 100%;
    box-sizing: border-box;
    padding: 8px 10px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
  }

  #add-client-form button {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    background: #2563eb;
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }

  .form-actions {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  #form-cancel-btn {
    background: #fff;
    color: #374151;
    border: 1px solid #d1d5db;
  }

  #form-cancel-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  #add-client-form button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  #message {
    margin-bottom: 12px;
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 13px;
  }

  .message.success {
    background: #ecfdf5;
    color: #047857;
    border: 1px solid #a7f3d0;
  }

  .message.error {
    background: #fef2f2;
    color: #b91c1c;
    border: 1px solid #fecaca;
  }

  #loading {
    color: #6b7280;
    font-size: 14px;
    margin-bottom: 12px;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid #e5e7eb;
  }

  .stat-card {
    padding: 12px;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    background: #f9fafb;
    text-align: center;
  }

  .stat-label {
    font-size: 12px;
    font-weight: 500;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 600;
    color: #1f2937;
  }

  .search-label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    font-weight: 500;
    color: #374151;
  }

  #client-search {
    width: 100%;
    box-sizing: border-box;
    padding: 8px 10px;
    margin-bottom: 16px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
  }

  #empty-state,
  #no-matching-state {
    color: #6b7280;
    font-size: 14px;
    font-style: italic;
  }

  #clientsList {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .client-item {
    padding: 12px;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    background: #f9fafb;
  }

  .client-name {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 4px;
  }

  .client-email {
    font-size: 13px;
    color: #4b5563;
    margin-bottom: 4px;
  }

  .client-status {
    font-size: 12px;
    color: #6b7280;
    text-transform: capitalize;
  }

  .edit-client-btn {
    padding: 6px 10px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    background: #fff;
    color: #374151;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }

  .edit-client-btn:hover {
    background: #f3f4f6;
  }

  .client-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  .delete-client-btn {
    padding: 6px 10px;
    border: 1px solid #fecaca;
    border-radius: 6px;
    background: #fff;
    color: #b91c1c;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }

  .delete-client-btn:hover {
    background: #fef2f2;
  }
