<script>
(function() {
  let clientsState = [];

  var loadingEl = document.getElementById('loading');
  var emptyEl = document.getElementById('empty-state');
  var noMatchingEl = document.getElementById('no-matching-state');
  var debugEl = document.getElementById('debug');
  var messageEl = document.getElementById('message');
  var formEl = document.getElementById('add-client-form');
  var searchEl = document.getElementById('client-search');
  var formTitleEl = document.getElementById('form-title');
  var clientIdEl = document.getElementById('client-id');
  var submitBtnEl = document.getElementById('form-submit-btn');
  var cancelBtnEl = document.getElementById('form-cancel-btn');

  loadClients();
  loadStats();

  if (cancelBtnEl) {
    cancelBtnEl.addEventListener('click', function() {
      exitEditMode();
      hideMessage();
    });
  }

  if (searchEl) {
    searchEl.addEventListener('input', function() {
      var filtered = filterClients(searchEl.value);
      renderClients(filtered);
    });
  }

  if (formEl) {
    formEl.addEventListener('submit', function(event) {
      event.preventDefault();

      var client = {
        name: document.getElementById('client-name').value.trim(),
        email: document.getElementById('client-email').value.trim(),
        phone: document.getElementById('client-phone').value.trim(),
        status: document.getElementById('client-status').value.trim(),
        notes: document.getElementById('client-notes').value.trim()
      };

      if (!client.name) {
        showError('Client name is required');
        return;
      }

      var clientId = clientIdEl ? clientIdEl.value.trim() : '';

      hideMessage();
      setFormDisabled(true);

      if (clientId) {
        client.id = Number(clientId);

        google.script.run
          .withSuccessHandler(function(updatedClient) {
            setFormDisabled(false);
            exitEditMode();
            showSuccess('Client updated successfully');
            loadClients();
            loadStats();
          })
          .withFailureHandler(function(error) {
            setFormDisabled(false);
            showError(error);
          })
          .updateClient(client);
        return;
      }

      google.script.run
        .withSuccessHandler(function(createdClient) {
          setFormDisabled(false);
          exitEditMode();
          showSuccess('Client added successfully');
          loadClients();
          loadStats();
        })
        .withFailureHandler(function(error) {
          setFormDisabled(false);
          showError(error);
        })
        .addClient(client);
    });
  }

  function enterEditMode(client) {
    if (!client || !formEl) {
      return;
    }

    if (clientIdEl) {
      clientIdEl.value = client.id;
    }

    document.getElementById('client-name').value = client.name || '';
    document.getElementById('client-email').value = client.email || '';
    document.getElementById('client-phone').value = client.phone || '';
    document.getElementById('client-status').value = client.status || '';
    document.getElementById('client-notes').value = client.notes || '';

    if (formTitleEl) {
      formTitleEl.textContent = 'Edit Client';
    }
    if (submitBtnEl) {
      submitBtnEl.textContent = 'Update Client';
    }
    if (cancelBtnEl) {
      cancelBtnEl.hidden = false;
    }

    formEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function exitEditMode() {
    if (!formEl) {
      return;
    }

    formEl.reset();

    if (clientIdEl) {
      clientIdEl.value = '';
    }
    if (formTitleEl) {
      formTitleEl.textContent = 'Add Client';
    }
    if (submitBtnEl) {
      submitBtnEl.textContent = 'Save Client';
    }
    if (cancelBtnEl) {
      cancelBtnEl.hidden = true;
    }
  }

  function loadClients() {
    if (loadingEl) {
      loadingEl.hidden = false;
      loadingEl.textContent = 'Loading clients...';
    }

    google.script.run
      .withSuccessHandler(function(clients) {
        console.log('Clients received:', clients);

        if (!Array.isArray(clients)) {
          showError('Invalid response from server');
          return;
        }

        if (loadingEl) {
          loadingEl.hidden = true;
        }

        if (debugEl) {
          debugEl.innerText = 'Loaded clients: ' + clients.length;
        }

        clientsState = clients;
        renderClients(clientsState);
      })
      .withFailureHandler(function(error) {
        showError(error);
      })
      .getClients();
  }

  function loadStats() {
    google.script.run
      .withSuccessHandler(function(stats) {
        renderStats(stats);
      })
      .withFailureHandler(function(error) {
        showError(error);
      })
      .getClientStats();
  }

  function renderStats(stats) {
    if (!stats) {
      return;
    }

    var totalEl = document.getElementById('statTotal');
    var newEl = document.getElementById('statNew');
    var activeEl = document.getElementById('statActive');
    var inactiveEl = document.getElementById('statInactive');

    if (totalEl) {
      totalEl.textContent = stats.total || 0;
    }
    if (newEl) {
      newEl.textContent = stats.new || 0;
    }
    if (activeEl) {
      activeEl.textContent = stats.active || 0;
    }
    if (inactiveEl) {
      inactiveEl.textContent = stats.inactive || 0;
    }
  }

  function filterClients(query) {
    var normalizedQuery = (query || '').trim().toLowerCase();

    if (!normalizedQuery) {
      return clientsState.slice();
    }

    return clientsState.filter(function(client) {
      var fields = [
        client.name,
        client.email,
        client.phone,
        client.status,
        client.notes
      ];

      return fields.some(function(value) {
        return String(value || '').toLowerCase().indexOf(normalizedQuery) !== -1;
      });
    });
  }

  function renderClients(clients) {
    var listEl = document.getElementById('clientsList');

    listEl.innerHTML = '';

    if (!Array.isArray(clients) || clients.length === 0) {
      if (emptyEl) {
        emptyEl.hidden = clientsState.length > 0;
      }
      if (noMatchingEl) {
        noMatchingEl.hidden = clientsState.length === 0;
      }
      return;
    }

    if (emptyEl) {
      emptyEl.hidden = true;
    }
    if (noMatchingEl) {
      noMatchingEl.hidden = true;
    }

    clients.forEach(function(client) {
      var item = document.createElement('div');
      item.className = 'client-item';

      var nameEl = document.createElement('div');
      nameEl.className = 'client-name';
      nameEl.textContent = client.name || '';

      var emailEl = document.createElement('div');
      emailEl.className = 'client-email';
      emailEl.textContent = client.email || '';

      var phoneEl = document.createElement('div');
      phoneEl.className = 'client-phone';
      phoneEl.textContent = client.phone || '';

      var statusEl = document.createElement('div');
      statusEl.className = 'client-status';
      statusEl.textContent = client.status || '';

      var notesEl = document.createElement('div');
      notesEl.className = 'client-notes';
      notesEl.textContent = client.notes || '';

      var actionsEl = document.createElement('div');
      actionsEl.className = 'client-actions';

      var editBtn = document.createElement('button');
      editBtn.type = 'button';
      editBtn.className = 'edit-client-btn';
      editBtn.textContent = 'Edit';
      editBtn.addEventListener('click', function() {
        enterEditMode(client);
      });

      var deleteBtn = document.createElement('button');
      deleteBtn.type = 'button';
      deleteBtn.className = 'delete-client-btn';
      deleteBtn.textContent = 'Delete';
      deleteBtn.addEventListener('click', function() {
        handleDeleteClient(client);
      });

      actionsEl.appendChild(editBtn);
      actionsEl.appendChild(deleteBtn);

      item.appendChild(nameEl);
      item.appendChild(emailEl);
      item.appendChild(phoneEl);
      item.appendChild(statusEl);
      item.appendChild(notesEl);
      item.appendChild(actionsEl);
      listEl.appendChild(item);
    });
  }

  function handleDeleteClient(client) {
    if (!client || !client.id) {
      return;
    }

    var confirmed = confirm(
      'Are you sure you want to delete ' + (client.name || 'this client') + '?'
    );

    if (!confirmed) {
      return;
    }

    hideMessage();

    google.script.run
      .withSuccessHandler(function(result) {
        var editingId = clientIdEl ? clientIdEl.value.trim() : '';
        if (editingId && Number(editingId) === Number(client.id)) {
          exitEditMode();
        }
        showSuccess('Client deleted successfully');
        loadClients();
        loadStats();
      })
      .withFailureHandler(function(error) {
        showError(error);
      })
      .deleteClient(client.id);
  }

  function setFormDisabled(disabled) {
    if (!formEl) {
      return;
    }

    var fields = formEl.querySelectorAll('input, textarea, button');
    fields.forEach(function(field) {
      field.disabled = disabled;
    });
  }

  function showSuccess(message) {
    if (!messageEl) {
      return;
    }

    messageEl.textContent = message;
    messageEl.className = 'message success';
    messageEl.hidden = false;
  }

  function showError(error) {
    if (loadingEl) {
      loadingEl.hidden = true;
    }

    var message = typeof error === 'string' ? error : (error && error.message) || 'Unknown error';

    if (messageEl) {
      messageEl.textContent = message;
      messageEl.className = 'message error';
      messageEl.hidden = false;
      return;
    }

    if (loadingEl) {
      loadingEl.textContent = 'Failed to load clients: ' + message;
    }
  }

  function hideMessage() {
    if (messageEl) {
      messageEl.hidden = true;
      messageEl.textContent = '';
      messageEl.className = 'message';
    }
  }
})();
</script>
